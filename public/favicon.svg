<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="8" fill="#0B0D14"/>

  <!-- Subtle inner glow background -->
  <rect width="32" height="32" rx="8" fill="url(#bg-grad)" opacity="0.6"/>

  <!-- Lime glow halo behind bolt -->
  <ellipse cx="16" cy="17" rx="9" ry="9" fill="#C8FF00" opacity="0.12"/>

  <!-- Lightning bolt — matches Zap icon from Lucide -->
  <path
    d="M18.5 4 L10 18 L15.5 18 L13.5 28 L23 14 L17.5 14 Z"
    fill="#C8FF00"
    stroke="#C8FF00"
    stroke-width="0.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1C1F2E"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </linearGradient>
  </defs>
</svg>